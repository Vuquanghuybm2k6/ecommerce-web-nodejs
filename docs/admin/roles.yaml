/api/admin/roles:
  get:
    tags:
      - Admin - Roles
    summary: List all roles
    description: Get all roles with optional pagination and search
    security:
      - BearerAuth: []
    parameters:
      - name: keyword
        in: query
        schema:
          type: string
        description: Search keyword
      - name: page
        in: query
        schema:
          type: integer
          default: 1
        description: Page number
      - name: limit
        in: query
        schema:
          type: integer
          default: 10
        description: Items per page
    responses:
      '200':
        description: Role list
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: number
                data:
                  type: object
                  properties:
                    roles:
                      type: array
                      items:
                        $ref: #/components/schemas/Role
      '401':
        description: Unauthorized

/api/admin/roles/create:
  get:
    tags:
      - Admin - Roles
    summary: Get role create page
    description: Get role creation page data
    security:
      - BearerAuth: []
    responses:
      '200':
        description: Create page data
      '401':
        description: Unauthorized
  post:
    tags:
      - Admin - Roles
    summary: Create a new role
    description: Create a new role with permissions
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - title
            properties:
              title:
                type: string
                description: Role title
              description:
                type: string
                description: Role description
              permissions:
                type: array
                items:
                  type: string
                description: Array of permission codes
    responses:
      '200':
        description: Role created
      '400':
        description: Validation error
      '401':
        description: Unauthorized

/api/admin/roles/edit/{id}:
  get:
    tags:
      - Admin - Roles
    summary: Get role for editing
    description: Retrieve role data for edit form
    security:
      - BearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Role ID
    responses:
      '200':
        description: Role data for editing
      '401':
        description: Unauthorized
      '404':
        description: Role not found
  patch:
    tags:
      - Admin - Roles
    summary: Update a role
    description: Update role details and permissions
    security:
      - BearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Role ID
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              title:
                type: string
              description:
                type: string
              permissions:
                type: array
                items:
                  type: string
    responses:
      '200':
        description: Role updated
      '401':
        description: Unauthorized
      '404':
        description: Role not found

/api/admin/roles/delete/{id}:
  delete:
    tags:
      - Admin - Roles
    summary: Delete a role
    description: Soft delete a role by setting the deleted flag
    security:
      - BearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Role ID
    responses:
      '200':
        description: Role deleted
      '401':
        description: Unauthorized

/api/admin/roles/permissions:
  get:
    tags:
      - Admin - Roles
    summary: Get permissions page
    description: Get all roles with their permissions for the permissions management page
    security:
      - BearerAuth: []
    responses:
      '200':
        description: Permissions data
      '401':
        description: Unauthorized
  patch:
    tags:
      - Admin - Roles
    summary: Update permissions
    description: Bulk update permissions for all roles
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - permissions
            properties:
              permissions:
                type: array
                description: Array of role permission updates
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      description: Role ID
                    permissions:
                      type: array
                      items:
                        type: string
                      description: Array of permission codes
    responses:
      '200':
        description: Permissions updated
      '401':
        description: Unauthorized
